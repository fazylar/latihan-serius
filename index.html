<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mosaic Film Analyst Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<!-- PAGE 1 INTRO -->
<section id="page-intro" class="page active">
<h1>Welcome Future Data Analyst 🎬</h1>

<p>
Today you will act as a data analyst for a streaming platform.
Your job is to decide what kind of film should be produced based on audience trends.
</p>

<button onclick="startGame()">Start Analysis</button>
</section>


<!-- PAGE 2 CONTEXT -->
<section id="page-context" class="page">
<h2>Audience Trend Detected</h2>

<p id="contextText"></p>

<button onclick="goBuilder()">Create Film</button>
</section>


<!-- PAGE 3 BUILD FILM -->
<section id="page-builder" class="page">

<h2>Build Your Film</h2>

<label>Genre</label>
<select id="genre">
<option>Romance</option>
<option>Horror</option>
<option>Comedy</option>
<option>Drama</option>
</select>

<label>Main Character</label>
<select id="mc">
<option>Childhood Friend</option>
<option>Strangers</option>
<option>Teacher & Student</option>
<option>Office Workers</option>
</select>

<label>Setting</label>
<select id="setting">
<option>School</option>
<option>City</option>
<option>Beach</option>
<option>Office</option>
</select>

<label>Ending</label>
<select id="ending">
<option>Happy Ending</option>
<option>Sad Ending</option>
<option>Open Ending</option>
</select>

<button onclick="calculate()">Test Audience</button>

</section>


<!-- PAGE 4 RESULT -->
<section id="page-result" class="page">

<h2>Audience Reaction</h2>

<div id="stars"></div>

<p id="resultText"></p>

<button onclick="restart()">Try Again</button>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
